<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Pantalla Federal - HLS</title>

<style>

body {
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

video {
    width:90%;
    max-width:900px;
    background:black;
}

</style>

</head>


<body>

<h1>Pantalla Federal</h1>

<h2>Prueba HLS con reproductor</h2>


<video id="video" controls autoplay></video>


<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>


<script>

const video = document.getElementById("video");

const url = "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8";


if (Hls.isSupported()) {

    const hls = new Hls();

    hls.loadSource(url);

    hls.attachMedia(video);

    hls.on(Hls.Events.ERROR, function(event, data) {

        console.log("ERROR HLS:", data);

    });

}


else if (video.canPlayType("application/vnd.apple.mpegurl")) {

    video.src = url;

}

</script>


</body>

</html>
